# Triggered when a tag of the form vX.Y.Z is pushed.
# Builds the frontend bundle, compiles the Go backend into a multi-arch
# Docker image (linux/amd64 + linux/arm64), pushes to GHCR, updates the
# Helm chart versions, packages the chart, and creates a GitHub release.
name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # openeverest/plugin-mongodb-explorer

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Build frontend bundle
  # ──────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build frontend bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # The plugin-sdk is referenced as a local file:// path. In CI the
      # monorepo is not present, so we need a published/registry version.
      # Temporarily replace the local path with the npm-published package
      # if it exists; otherwise the build proceeds with the local stub
      # already committed (adjust this step when the SDK is on npm).
      - name: Install dependencies
        run: npm ci

      - name: Build bundle
        run: npm run build    # outputs dist/main.js

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-bundle
          path: dist/main.js
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Build & push multi-arch Docker image
  # ──────────────────────────────────────────────────────────────────────────
  build-image:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: build-frontend
    permissions:
      contents: read
      packages: write

    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend bundle
        uses: actions/download-artifact@v4
        with:
          name: frontend-bundle
          path: dist/

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: backend/go.sum

      - name: Download Go modules
        run: cd backend && go mod download

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Package Helm chart and create GitHub release
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Package chart & create release
    runs-on: ubuntu-latest
    needs: build-image
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Extract version from tag
        id: version
        # Strip the leading "v" to get a SemVer string for Chart.yaml.
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Bump Chart.yaml version and appVersion
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          CHART="charts/plugin-mongodb-explorer/Chart.yaml"
          sed -i "s/^version:.*/version: ${VERSION}/" "$CHART"
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" "$CHART"
          cat "$CHART"

      - name: Bump image tag in values.yaml
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          sed -i "s/^  tag:.*/  tag: \"${VERSION}\"/" \
            charts/plugin-mongodb-explorer/values.yaml

      - name: Package Helm chart
        run: |
          mkdir -p release-artifacts
          helm package charts/plugin-mongodb-explorer/ \
            --destination release-artifacts/

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DIGEST="${{ needs.build-image.outputs.image-digest }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          cat > release-artifacts/notes.md <<EOF
          ## MongoDB Explorer Plugin v${VERSION}

          ### Docker image

          \`\`\`
          ${IMAGE}:${VERSION}
          \`\`\`

          Image digest: \`${DIGEST}\`

          Platforms: \`linux/amd64\`, \`linux/arm64\`

          ### Install with Helm

          \`\`\`bash
          helm install mongo-explorer oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/plugin-mongodb-explorer \\
            --version ${VERSION} \\
            -n everest-system
          \`\`\`

          Or from the release tarball:

          \`\`\`bash
          helm install mongo-explorer plugin-mongodb-explorer-${VERSION}.tgz -n everest-system
          \`\`\`
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          body_path: release-artifacts/notes.md
          files: |
            release-artifacts/plugin-mongodb-explorer-*.tgz
          fail_on_unmatched_files: true

      - name: Push Helm chart to GHCR OCI registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login \
            ${{ env.REGISTRY }} \
            --username ${{ github.actor }} \
            --password-stdin
          helm push release-artifacts/plugin-mongodb-explorer-*.tgz \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts
