apiVersion: v1
kind: Service
metadata:
  name: {{ include "plugin-mongodb-explorer.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "plugin-mongodb-explorer.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "plugin-mongodb-explorer.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
