replicaCount: 1

image:
  repository: ghcr.io/openeverest/plugin-mongodb-explorer
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  port: 8080

plugin:
  displayName: "MongoDB Explorer"
  description: "Browse databases and collections and run queries against MongoDB (PSMDB) clusters."
  vendor: "OpenEverest"
  enabled: true
  bundlePath: "/main.js"
  extensionPoints:
    - type: route
      path: /mongodb-explorer
      label: MongoDB Explorer
    - type: sidebarItem
      path: /mongodb-explorer
      label: MongoDB Explorer
      icon: storage
    - type: clusterDetailTab
      path: mongodb-explorer
      label: MongoDB Explorer

# URL of the OpenEverest API server, used by the backend to fetch
# cluster connection details. Defaults to the in-cluster service address.
everestAPIURL: "http://everest-server.everest-system.svc.cluster.local:8080"

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi
