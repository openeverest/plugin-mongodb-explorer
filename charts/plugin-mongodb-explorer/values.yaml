replicaCount: 1

image:
  repository: ghcr.io/openeverest/plugin-mongodb-explorer
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  port: 8080

plugin:
  displayName: "MongoDB Explorer"
  description: "Browse databases and collections and run queries against MongoDB (PSMDB) clusters."
  vendor: "OpenEverest"
  enabled: true
  bundlePath: "/main.js"
  extensionPoints:
    - type: route
      path: /mongodb-explorer
      label: MongoDB Explorer
    - type: sidebarItem
      path: /mongodb-explorer
      label: MongoDB Explorer
      iconUrl: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='currentColor'%3E%3Cpath d='M12 10.9c-.61 0-1.1.49-1.1 1.1s.49 1.1 1.1 1.1c.61 0 1.1-.49 1.1-1.1s-.49-1.1-1.1-1.1zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm2.19 12.19L6 18l3.81-8.19L18 6l-3.81 8.19z'/%3E%3C/svg%3E"
    - type: clusterDetailTab
      path: mongodb-explorer
      label: MongoDB Explorer

# Optional override for the Everest API URL. When left empty the backend
# auto-discovers the everest Service via Kubernetes-injected env vars
# (EVEREST_SERVICE_HOST / EVEREST_SERVICE_PORT), which are available for
# free when the plugin runs in the same namespace as the everest Service.
# Only set this for local dev or non-standard deployments.
everestAPIURL: ""

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi
